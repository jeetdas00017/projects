services:

  postgres_dw:
    image: postgres:16
    container_name: postgres_dw
    restart: unless-stopped
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow_db:
    image: postgres:16
    container_name: airflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5


  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
  airflow-init:

    image: apache/airflow:2.10.0

    container_name: airflow-init

    depends_on:
      - airflow_db

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db/airflow

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Jeet
      --lastname Das
      --role Admin
      --email admin@test.com
      "

  airflow-webserver:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: airflow-webserver

    restart: always

    depends_on:
      - airflow_db
      - postgres_dw

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PG_HOST: postgres_dw
      PG_PORT: "5432"
      PG_DATABASE: warehouse
      PG_USER: admin
      PG_PASSWORD: admin
      SF_ACCOUNT: dw03145.ap-south-1.aws
      SF_USER: JEETDAS0017
      SF_PASSWORD: Newzealandauck_2026
      SF_DATABASE: SNOWFLAKE_WH
      SF_STAGE_SCHEMA: STAGE
      SF_RAW_SCHEMA: RAW_TABLE
      SF_WAREHOUSE_SCHEMA: WAREHOUSE
      SF_MARKETING_SCHEMA: MARKETING_TEAM
      SF_SALES_SCHEMA: SALES_TEAM
      SF_CONTROL_SCHEMA: ETL_CONTROL
      SF_WAREHOUSE: compute_wh
      SF_ROLE: ACCOUNTADMIN
      S3_RAW_BUCKET: jeet-project-raw-layer
      S3_RAW_PREFIX: raw
      S3_ENDPOINT: ""
      AWS_ACCESS_KEY_ID: AKIA3I6WN55TCO352XEZ
      AWS_SECRET_ACCESS_KEY: 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
      AWS_DEFAULT_REGION: ap-south-1
      PG_SOURCE_SCHEMA: postgres_table
      PG_TIMESTAMP_COLUMN: updated_at
      ETL_CONTROL_TABLE: extract_latest_timestamp
      ETL_TABLES: customers,products,orders
      PARQUET_COMPRESSION: snappy
      PARQUET_TIMESTAMP_UNIT: us
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./extract:/opt/airflow/extract

    ports:
      - "8080:8080"

    command: bash -c "airflow db migrate && airflow webserver"

  airflow-scheduler:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: airflow-scheduler

    restart: always

    depends_on:
      - airflow_db
      - postgres_dw

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PG_HOST: postgres_dw
      PG_PORT: "5432"
      PG_DATABASE: warehouse
