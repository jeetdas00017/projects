version: 2

models:
  - name: stg_customers
    description: "Cleaned customer records from the latest extract batch."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: email
        tests:
          - not_null

  - name: stg_products
    description: "Cleaned product records from the latest extract batch."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

      - name: price
        tests:
          - dbt_utils.accepted_range:
              min_value: 0

  - name: stg_orders
    description: "Cleaned order records from the latest extract batch."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

      - name: total_amount
        tests:
          - dbt_utils.accepted_range:
              min_value: 0

  - name: int_customers_current
    description: "Current customer dimension."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: int_products_current
    description: "Current product dimension."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null