version: 2

sources:
  - name: raw
    database: "{{ env_var('SF_DATABASE') }}"
    schema: raw_table

    tables:
      - name: customers
        description: "Landing table for customer records (latest COPY batch from S3)."
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 12, period: hour}
        columns:
          - name: customer_id
            tests:
              - not_null
          - name: email
            tests:
              - not_null

      - name: products
        description: "Landing table for product records (latest COPY batch from S3)."
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 12, period: hour}
        columns:
          - name: product_id
            tests:
              - not_null
          - name: price
            tests:
              - not_null

      - name: orders
        description: "Landing table for order records (latest COPY batch from S3)."
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 12, period: hour}
        columns:
          - name: order_id
            tests:
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: total_amount
            tests:
              - not_null
