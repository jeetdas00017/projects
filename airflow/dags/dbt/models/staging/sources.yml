version: 2

sources:
  - name: raw
    database: SNOWFLAKE_WH
    schema: RAW


    # Validation: alert if a batch hasn't refreshed within expected SLA
    freshness:
      warn_after: {count: 6, period: hour}
      error_after: {count: 12, period: hour}

    tables:
      - name: customers
        description: "Landing table for customer records (latest COPY batch from S3)."
        columns:
          - name: customer_id
            tests:
              - not_null
          - name: email
            tests:
              - not_null

      - name: products
        description: "Landing table for product records (latest COPY batch from S3)."
        columns:
          - name: product_id
            tests:
              - not_null
          - name: price
            tests:
              - not_null

      - name: orders
        description: "Landing table for order records (latest COPY batch from S3)."
        columns:
          - name: order_id
            tests:
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: total_amount
            tests:
              - not_null
